
APP_SECRET_TOKEN: ${APP_SECRET_TOKEN:G25K03g01@}

spring:
  main:
    allow-bean-definition-overriding: true
  thymeleaf:
    cache: false # Desativar cache ajuda no desenvolvimento na OCI

server:
  port: 8080
  # Estratégia 'framework' faz o Spring respeitar o header X-Forwarded-Prefix do Apache
  forward-headers-strategy: framework

nextdns:
  api:
    key: ${NEXTDNS_API_KEY}
    profile-id: ${NEXTDNS_PROFILE_ID}
  base-url: https://api.nextdns.io
