<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle NextDNS - Painel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; padding-top: 50px; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .btn-timer { background-color: #6f42c1; color: white; transition: 0.3s; }
        .btn-timer:hover { background-color: #8559da; transform: scale(1.02); }
        .btn-lg { font-weight: bold; border-radius: 10px; }
        /* Aviso no próprio HTML */
        #statusMessage { display: none; margin-bottom: 20px; border-radius: 10px; font-weight: bold; }
        .user-badge { font-size: 0.8rem; color: #888; margin-top: 10px; }
        .title {color: white;}
    </style>
</head>
<body>

    <div class="container text-center" style="max-width: 450px;">
        
        <div id="statusMessage" class="alert shadow-sm"></div>

        <div class="card p-4 shadow">
            <h2 class="title mb-2">🎮 NextDNS Control</h2>
            <div class="user-badge" th:text="'Logado como: ' + ${userEmail}"></div>
            <hr class="my-4 border-secondary">

            <div class="d-grid gap-3">
                <button onclick="executarAcao('/gui/bloquear', '🔒 YouTube BLOQUEADO!', 'alert-danger')" class="btn btn-danger btn-lg py-3">
                    Bloquear Agora
                </button>

                <button onclick="executarAcao('/gui/liberar', '🔓 YouTube LIBERADO!', 'alert-success')" class="btn btn-success btn-lg py-3">
                    Liberar Geral

                <div class="mt-4">
                    <h6 class="text-secondary text-start">⏱️ ACESSO TEMPORÁRIO</h6>
                    <div class="row g-2">
                        <div class="col-8">
                            <select id="minutosSelect" class="form-select bg-dark text-white border-secondary h-100">
                                <option value="1">1 minuto (Teste)</option>
                        </div>
                    </div>
                </div>
            </div>
            
            <form th:action="@{/logout}" method="post" class="mt-4">
                <button type="submit" class="btn btn-link btn-sm text-secondary p-0">Sair da Conta</button>
            </form>
        </div>
    </div>

<script th:inline="javascript">
/*<![CDATA[*/
const contextPath = /*[[@{/}]]*/ '';

function mostrarMensagem(texto, classe) {
    const box = document.getElementById('statusMessage');
    box.innerText = texto;
    box.className = `alert ${classe} shadow-sm`;
    box.style.display = 'block';
    
    // Opcional: sumir após 5 segundos
    setTimeout(() => { box.style.display = 'none'; }, 5000);
}

async function executarAcao(endpoint, mensagem, classeCor) {
    try {
        const url = contextPath.endsWith('/') ? contextPath.slice(0,-1) + endpoint : contextPath + endpoint;
        const response = await fetch(url, { method: 'POST' });
        
        if (response.ok) {
            mostrarMensagem(mensagem, classeCor);
        } else {
            mostrarMensagem("❌ Erro na operação: " + response.status, "alert-warning");
        }
    } catch (e) {
        mostrarMensagem("📡 Falha na conexão com o servidor", "alert-warning");
    }
}

async function iniciarTimer() {
    const select = document.getElementById('minutosSelect');
    const mins = select.value;
    const textoMins = select.options[select.selectedIndex].text;

    const url = contextPath.endsWith('/') ? contextPath.slice(0,-1) + '/gui/timer' : contextPath + '/gui/timer';
    
    const formData = new URLSearchParams();
    formData.append('minutos', mins);

    try {
        const response = await fetch(url, {
            method: 'POST',
            body: formData,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });

        if (response.ok) {
            mostrarMensagem(`🚀 Acesso liberado por ${textoMins}!`, "alert-info");
        } else {
            mostrarMensagem("❌ Erro ao iniciar timer", "alert-warning");
        }
    } catch (e) {
        mostrarMensagem("📡 Erro de rede no timer", "alert-warning");
    }
}
/*]]>*/
</script>
</body>
</html>
