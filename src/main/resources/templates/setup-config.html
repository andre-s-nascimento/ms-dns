<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configurar NextDNS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">
<div class="container" style="max-width: 500px;">
    <div class="card bg-secondary p-4">
        <h3>Bem-vindo, <span th:text="${userEmail}"></span></h3>

        <form th:action="@{/gui/setup}" method="post">
            <div class="mb-3">
                <label>ID do Perfil:</label>
                <input type="text" name="profileId" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>API Key:</label>
                <input type="password" name="apiKey" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Salvar
            </button>
        </form>
    </div>
</div>
</body>
</html>
